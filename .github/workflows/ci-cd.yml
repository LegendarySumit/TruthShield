name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest mypy

      - name: Type check backend
        run: mypy backend/main.py --ignore-missing-imports --disable-error-code=assignment --disable-error-code=arg-type --disable-error-code=misc

      - name: Run backend tests
        run: pytest backend/tests -q

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backend dependency vulnerability scan
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend dependency vulnerability scan
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

  container-build:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, security-scans]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t truthshield-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t truthshield-frontend:ci .

  staging-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [container-build]
    environment: staging
    steps:
      - name: Staging preview gate
        run: echo "All checks passed. Ready for staging deployment trigger."

  production-deploy-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [container-build]
    environment: production
    steps:
      - name: Production deploy gate
        run: echo "All checks passed. Safe to deploy production."
